<div class="card">
  <div class="card__image">
    <img [src]="trip.image" [alt]="trip.title">
    <span class="card__badge">{{ trip.category }}</span>
  </div>

  <div class="card__body">
    <p class="card__location">{{ trip.location }}</p>
    <h3 class="card__title">{{ trip.title }}</h3>

    <div class="card__footer">
      <div class="card__price">
        Desde <strong>{{ trip.price }} €</strong>
      </div>
      <button class="card__btn">Reservar</button>
    </div>
  </div>
</div>
